services:

  mysql:

    image: mysql:8.0

    container_name: lottery-mysql

    restart: unless-stopped

    environment:

      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lottery_root}

      MYSQL_DATABASE: ${MYSQL_DATABASE:-lottery_ai}

      MYSQL_USER: ${MYSQL_USER:-lottery}

      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lottery_pass}

    ports:

      - "${MYSQL_PORT:-3306}:3306"

    volumes:

      - mysql_data:/var/lib/mysql

      - ./database/init:/docker-entrypoint-initdb.d:ro

    healthcheck:

      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]

      interval: 10s

      timeout: 5s

      retries: 5



  redis:

    image: redis:7-alpine

    container_name: lottery-redis

    restart: unless-stopped

    ports:

      - "${REDIS_PORT:-6379}:6379"

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 10s

      timeout: 5s

      retries: 5



  kafka:

    image: apache/kafka:3.9.0

    container_name: lottery-kafka

    restart: unless-stopped

    ports:

      - "${KAFKA_PORT:-9092}:9092"

    environment:

      KAFKA_NODE_ID: "1"

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_NUM_PARTITIONS: 3

    healthcheck:

      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]

      interval: 15s

      timeout: 10s

      retries: 8

      start_period: 30s



  schema-registry:

    image: confluentinc/cp-schema-registry:7.6.0

    container_name: lottery-schema-registry

    restart: unless-stopped

    depends_on:

      kafka:

        condition: service_healthy

    ports:

      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"

    environment:

      SCHEMA_REGISTRY_HOST_NAME: schema-registry

      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092

      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

    healthcheck:

      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]

      interval: 15s

      timeout: 10s

      retries: 6

      start_period: 20s



  backend:

    build:

      context: ./backend

      dockerfile: ../docker/backend.Dockerfile

    container_name: lottery-backend

    restart: unless-stopped

    depends_on:

      mysql:

        condition: service_healthy

      redis:

        condition: service_healthy

      kafka:

        condition: service_healthy

    environment:

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-lottery_ai}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai

      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-lottery}

      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-lottery_pass}

      SPRING_DATA_REDIS_HOST: redis

      SPRING_DATA_REDIS_PORT: 6379

      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-key-at-least-256-bits}

      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

      AI_SERVICE_URL: http://ai-service:8000

      SYNC_ENABLED: ${SYNC_ENABLED:-true}

      SYNC_CRON: ${SYNC_CRON:-0 */30 * * * *}

      SYNC_FEED_TYPE: ${SYNC_FEED_TYPE:-mock}

      SYNC_EXTERNAL_URL: ${SYNC_EXTERNAL_URL:-}

      SYNC_EXTERNAL_API_KEY: ${SYNC_EXTERNAL_API_KEY:-}

      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      KAFKA_USE_AVRO: ${KAFKA_USE_AVRO:-false}

      KAFKA_SCHEMA_REGISTRY_URL: http://schema-registry:8081

      KAFKA_SCHEMA_VERSION: ${KAFKA_SCHEMA_VERSION:-1.0}

      KAFKA_TOPIC_SLA_BREACH: ${KAFKA_TOPIC_SLA_BREACH:-lottery.sla.breach}

      LOTTERY_REGION: ${LOTTERY_REGION:-local}

      SYNC_EXTERNAL_MAX_RETRIES: ${SYNC_EXTERNAL_MAX_RETRIES:-3}

      SYNC_EXTERNAL_TIMEOUT_MS: ${SYNC_EXTERNAL_TIMEOUT_MS:-5000}

    ports:

      - "${BACKEND_PORT:-8080}:8080"



  ai-service:

    build:

      context: ./ai-service

      dockerfile: ../docker/ai-service.Dockerfile

    container_name: lottery-ai-service

    restart: unless-stopped

    depends_on:

      kafka:

        condition: service_healthy

    environment:

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}

      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      KAFKA_USE_AVRO: ${KAFKA_USE_AVRO:-false}

      KAFKA_SCHEMA_VERSION: ${KAFKA_SCHEMA_VERSION:-1.0}

      KAFKA_TOPIC_SLA_BREACH: ${KAFKA_TOPIC_SLA_BREACH:-lottery.sla.breach}

      LOTTERY_REGION: ${LOTTERY_REGION:-local}

    ports:

      - "${AI_SERVICE_PORT:-8000}:8000"



  frontend:

    build:

      context: ./frontend

      dockerfile: ../docker/frontend.Dockerfile

      args:

        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}

        VITE_AI_BASE_URL: ${VITE_AI_BASE_URL:-http://localhost:8000}

    container_name: lottery-frontend

    restart: unless-stopped

    depends_on:

      - backend

    ports:

      - "${FRONTEND_PORT:-5173}:80"



volumes:

  mysql_data:


