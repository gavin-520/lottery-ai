# Copy to secrets.yaml and fill values before apply
apiVersion: v1
kind: Secret
metadata:
  name: lottery-secrets
  namespace: lottery-ai
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: lottery_root
  MYSQL_PASSWORD: lottery_pass
  JWT_SECRET: change-me-to-a-long-random-secret-key-at-least-256-bits
  OPENAI_API_KEY: ""
