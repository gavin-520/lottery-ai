apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: lottery-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: lottery-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lottery-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: lottery-config
                  key: OPENAI_MODEL
            - name: KAFKA_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: lottery-config
                  key: KAFKA_ENABLED
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: lottery-config
                  key: KAFKA_BOOTSTRAP_SERVERS
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: lottery-ai
spec:
  selector:
    app: ai-service
  ports:
    - port: 8000
